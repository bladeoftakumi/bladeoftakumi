<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blade of Takumi</title>
<link rel="icon" type="image/png" href="assets/logo-line.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Share+Tech+Mono&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=Instrument+Serif:ital@0;1&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  @font-face {
    font-family: 'Luxia Display';
    src: url('fonts/LuxiaDisplay.otf') format('opentype');
    font-weight: 400 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Luxia';
    src: url('fonts/LuxiaRegular.otf') format('opentype');
    font-weight: 400 600;
    font-style: normal;
    font-display: swap;
  }
  :root {
    --bg: #0a0a0a;
    --bg-soft: #0e0d0b;
    --surface: #121110;
    --surface-2: #161412;
    --line: #211f1b;
    --line-soft: #1a1815;
    --ink: #e9e4d8;
    --ink-dim: #9a948a;
    --ink-faint: #6b665d;
    --accent: #b4965a;
    --accent-soft: rgba(180,150,90,0.14);
    --atmo: 0.55;
    --head-weight: 400;
    --font-head: 'Luxia Display', Georgia, serif;
    --font-body: 'Luxia', Georgia, serif;
    --font-mono: 'Luxia', Georgia, serif;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent-soft); color: var(--ink); }

  a { color: inherit; text-decoration: none; }

  .mono {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: 0.72rem;
  }

  .wrap { width: min(1180px, 90vw); margin: 0 auto; }

  /* ---------- NAV ---------- */
  nav.site {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,10,0.78);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line-soft);
  }
  nav.site .wrap {
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .logo {
    font-family: var(--font-head);
    font-weight: var(--head-weight);
    color: var(--accent);
    font-size: 1.18rem;
    letter-spacing: 0.04em;
  }
  .navlinks { display: flex; gap: clamp(1.4rem, 3vw, 2.8rem); }
  .navlinks a {
    color: var(--ink-dim);
    transition: color 0.3s ease;
    position: relative;
  }
  .navlinks a::after {
    content: ""; position: absolute; left: 0; bottom: -6px;
    width: 100%; height: 1px; background: var(--accent);
    transform: scaleX(0); transform-origin: left; transition: transform 0.35s ease;
  }
  .navlinks a:hover { color: var(--ink); }
  .navlinks a:hover::after { transform: scaleX(1); }

  /* ---------- HERO ---------- */
  .hero { position: relative; min-height: 92vh; overflow: hidden; display: flex; align-items: flex-end; }
  .hero-img { position: absolute; inset: 0; width: 100%; height: 100%; }
  .hero-photo {
    position: absolute; inset: 0; width: 100%; height: 100%;
    background-color: var(--bg);
    background-image: url('assets/hero.jpg');
    background-size: auto 100%;
    background-position: right top;
    background-repeat: no-repeat;
    filter: saturate(0.94) contrast(1.02);
  }

  .hero-atmo {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(90% 80% at 80% 30%, rgba(180,150,90, calc(var(--atmo) * 0.4)) 0%, rgba(180,150,90,0) 46%),
      linear-gradient(90deg, rgba(10,10,10,1) 0%, rgba(10,10,10,0.96) 30%, rgba(10,10,10,0.55) 50%, rgba(10,10,10,0.05) 66%, rgba(10,10,10,0) 80%),
      radial-gradient(70% 55% at 60% 120%, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 60%),
      linear-gradient(180deg, rgba(10,10,10,0.45) 0%, rgba(10,10,10,0) 38%, rgba(10,10,10,0.82) 100%);
  }
  .hero-streak { display: none; }
  .hero-scan { display: none; }
  .hero-content { position: relative; z-index: 3; width: 100%; padding-bottom: clamp(3rem, 9vh, 7rem); padding-top: 6rem; pointer-events: none; }
  .hero-eyebrow { color: var(--accent); margin-bottom: 1.4rem; }
  .hero-title {
    font-family: var(--font-head);
    font-weight: var(--head-weight);
    font-size: clamp(3.2rem, 11vw, 9.5rem);
    line-height: 0.92;
    margin: 0;
    letter-spacing: 0.01em;
    color: var(--ink);
    text-shadow: 0 2px 40px rgba(0,0,0,0.6);
  }
  .hero-sub {
    font-family: var(--font-body);
    font-style: italic;
    font-size: clamp(1.15rem, 2.2vw, 1.7rem);
    color: var(--ink-dim);
    max-width: 34ch;
    margin: 1.8rem 0 0;
    line-height: 1.45;
  }

  /* ---------- SECTION SCAFFOLD ---------- */
  section.block { padding: clamp(4.5rem, 11vh, 8rem) 0; }
  .sec-head { display: flex; align-items: center; gap: 1.6rem; margin-bottom: 3.2rem; }
  .sec-head .label { color: var(--accent); white-space: nowrap; }
  .sec-head .rule { height: 1px; background: linear-gradient(90deg, var(--accent), var(--line)); flex: 1; opacity: 0.6; }

  /* ---------- PRESENCE CARDS ---------- */
  .presence-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  .link-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 2.2rem 2rem 2rem;
    min-height: 230px;
    display: flex; flex-direction: column;
    transition: background 0.35s ease, border-color 0.35s ease, transform 0.35s ease;
    overflow: hidden;
  }
  .link-card::after {
    content: ""; position: absolute; left: 2rem; right: 2rem; bottom: 1.7rem; height: 1px;
    background: var(--accent); transform: scaleX(0); transform-origin: left;
    transition: transform 0.45s cubic-bezier(.2,.7,.2,1);
  }
  .link-card:hover { background: var(--surface-2); border-color: #2a2620; transform: translateY(-3px); }
  .link-card:hover::after { transform: scaleX(1); }
  .lc-icon { color: var(--accent); margin-bottom: 1.5rem; }
  .lc-icon svg { width: 26px; height: 26px; display: block; }
  .lc-name { font-family: var(--font-head); font-weight: var(--head-weight); font-size: 1.45rem; color: var(--ink); margin: 0 0 0.5rem; }
  .lc-desc { font-family: var(--font-body); color: var(--ink-dim); font-size: 1.12rem; line-height: 1.4; margin: 0; }
  .lc-arrow {
    margin-top: auto; display: flex; align-items: center; gap: 0.6rem; white-space: nowrap;
    color: var(--ink-faint); font-family: var(--font-mono); font-size: 0.66rem;
    text-transform: uppercase; letter-spacing: 0.24em; padding-top: 1.6rem;
    transition: color 0.35s ease;
  }
  .lc-arrow svg { width: 18px; height: 18px; transition: transform 0.4s cubic-bezier(.2,.7,.2,1); }
  .link-card:hover .lc-arrow { color: var(--accent); }
  .link-card:hover .lc-arrow svg { transform: translateX(7px); }

  /* ---------- TOOLS GRID ---------- */
  .tools-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  .tool-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 2px solid var(--line);
    padding: 2.2rem 2rem;
    min-height: 250px;
    display: flex; flex-direction: column;
    transition: border-left-color 0.4s ease, background 0.35s ease, transform 0.35s ease;
  }
  .tool-card:hover { background: var(--surface-2); border-left-color: var(--accent); transform: translateY(-3px); }
  .tool-tag { color: var(--accent); margin-bottom: 1.3rem; font-size: 0.66rem; }
  .tool-name { font-family: var(--font-head); font-weight: var(--head-weight); font-size: 1.55rem; color: var(--ink); margin: 0 0 0.9rem; }
  .tool-desc { font-family: var(--font-body); color: var(--ink-dim); font-size: 1.14rem; line-height: 1.45; margin: 0; }
  .tool-open {
    margin-top: auto; display: flex; align-items: center; gap: 0.55rem; white-space: nowrap;
    color: var(--ink-faint); font-family: var(--font-mono); font-size: 0.64rem;
    text-transform: uppercase; letter-spacing: 0.24em; padding-top: 1.7rem;
    transition: color 0.35s ease;
  }
  .tool-open svg { width: 16px; height: 16px; transition: transform 0.4s ease; }
  .tool-card:hover .tool-open { color: var(--accent); }
  .tool-card:hover .tool-open svg { transform: translate(3px, -3px); }

  /* ---------- FOOTER ---------- */
  footer.site {
    border-top: 1px solid var(--line-soft);
    padding: 2.4rem 0;
    background: var(--bg-soft);
  }
  footer.site .wrap { display: flex; align-items: center; justify-content: space-between; }
  footer .f-brand { font-family: var(--font-head); font-weight: var(--head-weight); color: var(--accent); font-size: 1rem; letter-spacing: 0.04em; }
  footer .f-links { display: flex; gap: 1.8rem; }
  footer .f-links a { color: var(--ink-dim); font-size: 0.64rem; transition: color 0.3s ease; }
  footer .f-links a:hover { color: var(--accent); }
  footer .f-copy { color: var(--ink-faint); font-size: 0.64rem; }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 860px) {
    .presence-grid, .tools-grid { grid-template-columns: 1fr; }
    .navlinks { gap: 1.2rem; }
    .navlinks .mono { font-size: 0.62rem; letter-spacing: 0.18em; }
    .sec-head { gap: 1rem; }
  }
  @media (max-width: 760px) {
    .hero { min-height: 86vh; }
    .hero-photo { background-size: cover; background-position: 60% 14%; }
    .hero-atmo {
      background:
        radial-gradient(90% 70% at 60% 22%, rgba(180,150,90, calc(var(--atmo) * 0.35)) 0%, rgba(180,150,90,0) 50%),
        linear-gradient(180deg, rgba(10,10,10,0.45) 0%, rgba(10,10,10,0.1) 30%, rgba(10,10,10,0.7) 62%, rgba(10,10,10,0.97) 100%);
    }
  }
  @media (max-width: 560px) {
    nav.site .wrap { height: 58px; }
    .logo { font-size: 1rem; }
    .navlinks a:nth-child(1) { display: none; }
    footer.site .wrap { flex-direction: column; gap: 0.8rem; align-items: flex-start; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
