<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rihla — Outreach Route Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* dark mode — slate ground, brightened teal accent */
    --bg: #0e1416;
    --surface: #151c1f;
    --surface-2: #1a2327;
    --ink: #e8edee;
    --ink-2: #98a5a9;
    --ink-3: #687579;
    --line: #253034;
    --line-2: #1d2629;
    --accent: #2dd4bf;
    --accent-ink: #66e0d0;
    --accent-soft: rgba(45,212,191,.13);
    --warn: #e0a34a;
    --warn-soft: rgba(200,150,70,.12);
    --danger: #f0726a;
    --danger-soft: rgba(220,90,80,.12);
    --ok: #4ec98a;
    --radius: 11px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4), 0 1px 1px rgba(0,0,0,.3);
    --shadow-md: 0 8px 26px rgba(0,0,0,.5), 0 1px 3px rgba(0,0,0,.4);
    --shadow-lg: 0 24px 60px rgba(0,0,0,.6), 0 6px 16px rgba(0,0,0,.5);
    --font: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }
  #root { min-height: 100vh; }

  /* ---------- Nav ---------- */
  .nav {
    position: sticky; top: 0; z-index: 40;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px; padding: 0 22px;
    background: rgba(14,20,22,.8);
    backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand-mark {
    width: 30px; height: 30px; flex: none;
    display: grid; place-items: center;
    color: #fff;
  }
  .brand-name { font-weight: 600; font-size: 17px; letter-spacing: -.01em; color: var(--ink); }
  .brand-sub {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--ink-3); margin-top: 1px;
  }
  .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-user { font-size: 13px; color: var(--ink-2); font-family: var(--mono); }

  /* ---------- Buttons ---------- */
  .btn {
    appearance: none; border: 1px solid transparent; cursor: pointer;
    font-family: var(--font); font-weight: 500; font-size: 14px;
    padding: 10px 16px; border-radius: var(--radius-sm);
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .14s ease, border-color .14s ease, color .14s ease, transform .06s ease, box-shadow .14s ease;
    line-height: 1; white-space: nowrap;
  }
  .btn:active { transform: translateY(.5px); }
  .btn-primary { background: var(--accent); color: #0b1112; font-weight: 600; }
  .btn-primary:hover { background: var(--accent-ink); }
  .btn-primary:disabled { background: #2a3338; color: var(--ink-3); cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--ink-2); border-color: var(--line); }
  .btn-ghost:hover { background: var(--surface-2); color: var(--ink); border-color: #d6dadd; }
  .btn-quiet { background: transparent; color: var(--ink-3); padding: 6px 8px; }
  .btn-quiet:hover { color: var(--ink); }
  .btn-lg { padding: 13px 22px; font-size: 15px; }
  .btn-block { width: 100%; }

  /* ---------- Layout ---------- */
  .page { max-width: 760px; margin: 0 auto; padding: 38px 22px 90px; }
  .page-wide { max-width: 880px; }
  .page-head { margin-bottom: 26px; }
  .page-title { font-size: 25px; font-weight: 600; letter-spacing: -.02em; margin: 0 0 6px; }
  .page-desc { font-size: 14.5px; color: var(--ink-2); margin: 0; max-width: 56ch; }

  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow-sm);
  }
  .card-pad { padding: 30px 32px; }

  /* ---------- Form ---------- */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px 26px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field-full { grid-column: 1 / -1; }
  .label { font-size: 13px; font-weight: 600; color: var(--ink); display: block; line-height: 1.3; }
  .label .req { color: var(--accent); font-weight: 600; margin-left: 2px; }
  .hint-inline { color: var(--ink-3); font-weight: 400; font-size: 12px; margin-left: 3px; }
  .hint { font-size: 12px; color: var(--ink-3); font-weight: 400; line-height: 1.4; }
  .input, .select {
    font-family: var(--font); font-size: 14.5px; color: var(--ink);
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 11px 13px; width: 100%;
    transition: border-color .14s ease, box-shadow .14s ease;
    color-scheme: dark;
  }
  .input::placeholder { color: var(--ink-3); }
  .input:focus, .select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .input.mono { font-family: var(--mono); font-size: 13.5px; letter-spacing: -.01em; }
  .input-invalid { border-color: var(--danger); }
  .input-invalid:focus { box-shadow: 0 0 0 3px var(--danger-soft); }
  .err-msg { font-size: 12px; color: var(--danger); }

  .input-row { display: flex; gap: 8px; }
  .input-row .input { flex: 1; }

  /* unit toggle / segmented */
  .seg { display: inline-flex; padding: 3px; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius-sm); }
  .seg button {
    appearance: none; border: none; background: transparent; cursor: pointer;
    font-family: var(--mono); font-size: 12.5px; font-weight: 500; color: var(--ink-2);
    padding: 7px 13px; border-radius: 6px; transition: all .14s ease; line-height: 1;
  }
  .seg button.on { background: var(--surface); color: var(--accent-ink); box-shadow: var(--shadow-sm); }

  .key-wrap { position: relative; }
  .key-toggle {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: transparent; border: none; cursor: pointer; color: var(--ink-3);
    font-family: var(--mono); font-size: 11px; padding: 6px 8px; border-radius: 5px;
  }
  .key-toggle:hover { background: var(--surface-2); color: var(--ink); }

  .form-foot { margin-top: 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .est { font-size: 12.5px; color: var(--ink-2); font-family: var(--mono); }
  .est b { color: var(--ink); font-weight: 500; }

  .divider-or { display: flex; align-items: center; gap: 12px; margin: 30px 0; color: var(--ink-3); font-size: 12px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .1em; }
  .divider-or::before, .divider-or::after { content: ""; height: 1px; background: var(--line); flex: 1; }

  /* ---------- Banners ---------- */
  .banner { display: flex; gap: 11px; padding: 13px 15px; border-radius: var(--radius-sm); font-size: 13.5px; align-items: flex-start; line-height: 1.45; }
  .banner-icon { flex: none; margin-top: 1px; }
  .banner-warn { background: var(--warn-soft); color: var(--warn); border: 1px solid rgba(200,150,70,.28); }
  .banner-danger { background: var(--danger-soft); color: var(--danger); border: 1px solid rgba(220,90,80,.30); }
  .banner-info { background: var(--accent-soft); color: var(--accent-ink); border: 1px solid rgba(45,212,191,.26); }
  .banner b { font-weight: 600; }

  /* ---------- Progress / loading ---------- */
  .loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 22px; padding: 70px 0; text-align: center; }
  .spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--line); border-top-color: var(--accent); animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-status { font-family: var(--mono); font-size: 13px; color: var(--ink-2); }
  .loading-steps { display: flex; flex-direction: column; gap: 9px; width: 100%; max-width: 360px; text-align: left; }
  .lstep { display: flex; align-items: center; gap: 11px; font-size: 13.5px; color: var(--ink-3); }
  .lstep.active { color: var(--ink); }
  .lstep.done { color: var(--ink-2); }
  .lstep-dot { width: 18px; height: 18px; border-radius: 50%; flex: none; display: grid; place-items: center; border: 1.5px solid var(--line); font-size: 10px; }
  .lstep.active .lstep-dot { border-color: var(--accent); color: var(--accent); }
  .lstep.done .lstep-dot { background: var(--accent); border-color: var(--accent); color: #fff; }

  .usage-meter { width: 100%; max-width: 360px; }
  .usage-bar { height: 6px; background: var(--line-2); border-radius: 99px; overflow: hidden; }
  .usage-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s ease; }
  .usage-fill.warn { background: var(--warn); }
  .usage-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11.5px; color: var(--ink-3); margin-top: 7px; }

  /* ---------- Results ---------- */
  .results-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 24px; }
  .summary-stats { display: flex; gap: 26px; margin-top: 14px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-size: 22px; font-weight: 600; letter-spacing: -.01em; font-variant-numeric: tabular-nums; }
  .stat-label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3); }

  .day-card { margin-bottom: 16px; overflow: hidden; }
  .day-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--surface-2); border-bottom: 1px solid var(--line); }
  .day-head-l { display: flex; align-items: baseline; gap: 12px; }
  .day-badge { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--accent-ink); background: var(--accent-soft); padding: 4px 9px; border-radius: 6px; }
  .day-title { font-size: 16px; font-weight: 600; }
  .day-meta { font-family: var(--mono); font-size: 12px; color: var(--ink-2); }

  .stops { padding: 6px 0; }
  .day-foot { display: flex; padding: 13px 20px 15px; border-top: 1px solid var(--line-2); }
  .day-route { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
  .day-route:hover { color: var(--accent-ink); text-decoration: underline; }
  .stop { display: flex; gap: 14px; padding: 13px 20px; position: relative; }
  .stop-rail { display: flex; flex-direction: column; align-items: center; flex: none; }
  .stop-num { width: 26px; height: 26px; border-radius: 50%; background: var(--surface); border: 1.5px solid var(--accent); color: var(--accent-ink); font-family: var(--mono); font-size: 12px; font-weight: 500; display: grid; place-items: center; flex: none; }
  .stop-line { width: 2px; flex: 1; background: var(--line); margin: 4px 0 -17px; }
  .stop:last-child .stop-line { display: none; }
  .stop-body { flex: 1; min-width: 0; padding-bottom: 2px; }
  .stop-name { font-size: 15px; font-weight: 600; letter-spacing: -.005em; }
  .stop-addr { font-size: 13px; color: var(--ink-2); margin-top: 2px; }
  .stop-cats { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
  .chip { font-family: var(--mono); font-size: 10.5px; letter-spacing: .03em; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--line); padding: 2px 7px; border-radius: 5px; }
  .stop-drive { font-family: var(--mono); font-size: 11.5px; color: var(--ink-3); display: flex; align-items: center; gap: 6px; padding: 5px 20px 5px 60px; }
  .stop-drive svg { color: var(--ink-3); }

  .maplink { font-size: 12.5px; color: var(--accent); text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; white-space: nowrap; }
  .maplink:hover { text-decoration: underline; }

  .download-bar { position: sticky; bottom: 0; z-index: 30; background: rgba(14,20,22,.82); backdrop-filter: blur(10px); border-top: 1px solid var(--line); padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .download-bar-info { font-size: 13px; color: var(--ink-2); }

  /* ---------- Auth ---------- */
  .auth-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background:
      radial-gradient(900px 600px at 80% -10%, rgba(45,212,191,.12), transparent 60%),
      radial-gradient(700px 500px at -10% 110%, rgba(45,212,191,.06), transparent 55%),
      #0e1416;
    display: grid; overflow-y: auto; padding: 22px;
  }
  .auth-card {
    width: 100%; max-width: 408px; margin: auto; background: var(--surface);
    border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow-lg);
    padding: 34px 32px 30px; animation: rise .35s cubic-bezier(.2,.7,.3,1) both;
  }
  @media (prefers-reduced-motion: no-preference) {
    @keyframes rise { from { transform: translateY(12px) scale(.99); } to { transform: none; } }
  }
  .auth-brand { display: flex; align-items: center; gap: 11px; margin-bottom: 24px; }
  .auth-title { font-size: 20px; font-weight: 600; letter-spacing: -.015em; margin: 0 0 5px; }
  .auth-desc { font-size: 13.5px; color: var(--ink-2); margin: 0 0 22px; }
  .auth-fields { display: flex; flex-direction: column; gap: 15px; }
  .auth-switch { margin-top: 20px; text-align: center; font-size: 13px; color: var(--ink-2); }
  .auth-switch button { background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer; font-family: var(--font); font-size: 13px; padding: 0; white-space: nowrap; }
  .auth-switch button:hover { text-decoration: underline; }
  .auth-note { margin-top: 18px; font-size: 11.5px; color: var(--ink-3); text-align: center; line-height: 1.5; }

  /* ---------- Buttons (extra variants) ---------- */
  .btn-outline { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn-outline:hover { background: var(--surface-2); border-color: var(--ink-3); color: var(--ink); }
  .btn-sm { padding: 7px 12px; font-size: 13px; }

  /* ---------- Nav extras ---------- */
  .brand-btn { appearance: none; background: none; border: none; cursor: pointer; padding: 0; font-family: var(--font); color: var(--ink); text-align: left; }
  .nav { justify-content: space-between; }
  .nav-mode { display: flex; align-items: center; gap: 12px; }
  .nav-mode-tag { font-size: 12px; font-family: var(--mono); color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em; }

  /* ---------- Landing ---------- */
  .landing { max-width: 880px; }
  .landing-head { text-align: center; max-width: 600px; margin: 22px auto 38px; }
  .landing-title { font-size: 34px; font-weight: 700; letter-spacing: -.025em; margin: 0 0 12px; line-height: 1.1; }
  .landing-sub { font-size: 16px; color: var(--ink-2); line-height: 1.55; margin: 0; }
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .choice-card {
    appearance: none; text-align: left; cursor: pointer; font-family: var(--font); color: var(--ink);
    display: flex; flex-direction: column; align-items: flex-start; gap: 12px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
    padding: 28px 26px 24px; box-shadow: var(--shadow-sm);
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .choice-card:hover { transform: translateY(-3px); border-color: color-mix(in oklab, var(--accent) 50%, var(--line)); box-shadow: var(--shadow-md); }
  .choice-icon {
    width: 52px; height: 52px; border-radius: 13px; display: grid; place-items: center;
    background: var(--accent-soft); color: var(--accent-ink); margin-bottom: 4px;
  }
  .choice-name { font-size: 20px; font-weight: 650; letter-spacing: -.01em; color: var(--ink); }
  .choice-desc { font-size: 14px; color: var(--ink-2); line-height: 1.55; flex: 1; }
  .choice-cta { display: inline-flex; align-items: center; gap: 7px; color: var(--accent-ink); font-weight: 600; font-size: 14px; margin-top: 4px; white-space: nowrap; }
  .landing-flow {
    display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
    margin-top: 34px; font-family: var(--mono); font-size: 12px; color: var(--ink-3);
  }
  .landing-flow span { white-space: nowrap; }

  /* ---------- Organizer: upload ---------- */
  .org-intro { margin-bottom: 22px; }
  .dropzone {
    border: 1.5px dashed var(--line); border-radius: 16px; background: var(--surface);
    padding: 52px 24px; text-align: center; cursor: pointer; transition: border-color .18s, background .18s;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 7%, var(--surface)); }
  .dropzone-icon { width: 56px; height: 56px; border-radius: 14px; background: var(--accent-soft); color: var(--accent-ink); display: grid; place-items: center; margin: 0 auto 16px; }
  .dropzone-title { font-size: 17px; font-weight: 600; margin-bottom: 5px; }
  .dropzone-sub { font-size: 13.5px; color: var(--ink-2); }
  .dropzone-link { color: var(--accent-ink); font-weight: 600; text-decoration: underline; }
  .org-altrow { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 20px; }
  .org-alt-or { font-size: 13px; color: var(--ink-3); }
  .org-resume { align-items: center; }
  .org-resume-actions { display: flex; gap: 8px; margin-left: auto; }

  /* ---------- Organizer: dashboard ---------- */
  .org-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; flex-wrap: wrap; margin-bottom: 20px; }
  .org-top-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .org-saved { color: var(--accent-ink); display: inline-flex; align-items: center; gap: 4px; }
  .org-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .org-stat { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; display: flex; flex-direction: column; gap: 3px; }
  .org-stat-num { font-size: 24px; font-weight: 650; letter-spacing: -.01em; font-variant-numeric: tabular-nums; }
  .org-stat-num.accent { color: var(--accent-ink); }
  .org-stat-label { font-size: 12px; color: var(--ink-3); }
  .org-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
  .org-search { display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--line); border-radius: 9px; padding: 0 12px; flex: 1; min-width: 220px; color: var(--ink-3); }
  .org-search input { appearance: none; border: none; outline: none; background: none; font-family: var(--font); font-size: 14px; color: var(--ink); padding: 10px 0; width: 100%; }
  .org-search input::placeholder { color: var(--ink-3); }
  .org-filters { display: flex; gap: 7px; flex-wrap: wrap; }
  .org-filter { appearance: none; cursor: pointer; font-family: var(--font); font-size: 12.5px; padding: 7px 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); color: var(--ink-2); white-space: nowrap; }
  .org-filter:hover { color: var(--ink); border-color: var(--ink-3); }
  .org-filter.active { background: var(--accent); color: #0b1112; border-color: var(--accent); font-weight: 600; }
  .org-empty { text-align: center; color: var(--ink-3); padding: 40px; font-size: 14px; }
  .org-daygroup { margin-bottom: 22px; }
  .org-daylabel { display: flex; align-items: center; gap: 9px; font-size: 12px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; color: var(--ink-3); margin: 0 2px 11px; }
  .org-daylabel span { background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 1px 8px; font-size: 11px; }
  .org-cards { display: flex; flex-direction: column; gap: 10px; }

  /* ---------- School card ---------- */
  .school-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; transition: border-color .15s; }
  .school-card.open { border-color: var(--ink-3); }
  .sc-head { width: 100%; appearance: none; background: none; border: none; cursor: pointer; font-family: var(--font); text-align: left; color: var(--ink);
    display: flex; align-items: center; gap: 13px; padding: 15px 18px; }
  .sc-head:hover { background: var(--surface-2); }
  .sc-dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .sc-head-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
  .sc-name { font-size: 15px; font-weight: 600; color: var(--ink); }
  .sc-addr { font-size: 12.5px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sc-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 3px; }
  .sc-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--line-2); border-radius: 6px; padding: 2px 7px; }
  .sc-tag-appt { color: var(--accent-ink); border-color: color-mix(in oklab, var(--accent) 30%, var(--line)); }
