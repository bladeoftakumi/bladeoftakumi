<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Teleprompter — Blade of Takumi</title>
<link rel="icon" type="image/png" href="assets/logo-line.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Spectral:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --bg-soft: #0e0d0b;
    --surface: #121110;
    --surface-2: #161412;
    --line: #211f1b;
    --line-soft: #1a1815;
    --ink: #e9e4d8;
    --ink-dim: #9a948a;
    --ink-faint: #6b665d;
    --accent: #b4965a;
    --accent-soft: rgba(180,150,90,0.14);
    --font-head: 'Instrument Serif', Georgia, serif;
    --font-body: 'Spectral', Georgia, serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { box-sizing: border-box; }

  /* minimal scrollbar */
  * { scrollbar-width: thin; scrollbar-color: #2a2620 transparent; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2620; border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent, #b4965a); background-clip: padding-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent-soft); color: var(--ink); }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  .mono {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: 0.72rem;
  }
  .wrap { width: min(1180px, 92vw); margin: 0 auto; }

  /* ---------- NAV ---------- */
  nav.site {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,10,0.78);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line-soft);
  }
  nav.site .wrap {
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .logo {
    font-family: var(--font-head);
    color: var(--accent);
    font-size: 1.18rem;
    letter-spacing: 0.04em;
  }
  .navlinks { display: flex; align-items: center; gap: clamp(1.4rem, 3vw, 2.8rem); }
  .navlinks a { color: var(--ink-dim); transition: color 0.3s ease; position: relative; }
  .navlinks a::after {
    content: ""; position: absolute; left: 0; bottom: -6px;
    width: 100%; height: 1px; background: var(--accent);
    transform: scaleX(0); transform-origin: left; transition: transform 0.35s ease;
  }
  .navlinks a:hover { color: var(--ink); }
  .navlinks a:hover::after { transform: scaleX(1); }

  /* ---------- PAGE HEAD ---------- */
  .page-head { padding: clamp(3rem, 7vh, 5rem) 0 0; }
  .sec-head { display: flex; align-items: center; gap: 1.6rem; }
  .sec-head .label { color: var(--accent); white-space: nowrap; }
  .sec-head .rule { height: 1px; background: linear-gradient(90deg, var(--accent), var(--line)); flex: 1; opacity: 0.6; }
  .sec-head .count {
    color: var(--ink-faint); white-space: nowrap;
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.26em; font-size: 0.6rem;
  }
  .page-title {
    font-family: var(--font-head);
    font-weight: 400;
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    line-height: 1;
    margin: 2rem 0 0;
    letter-spacing: 0.01em;
    color: var(--ink);
  }

  /* ---------- SETUP ---------- */
  .setup { padding-bottom: clamp(4rem, 9vh, 7rem); }
  .step-label {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.3em;
    font-size: 0.64rem; color: var(--accent); margin: 0;
  }

  .script-box {
    position: relative; margin-top: 1.4rem;
    background: var(--surface); border: 1px solid var(--line);
  }
  .script-box textarea {
    display: block; width: 100%; min-height: 280px; resize: vertical;
    background: transparent; border: none; color: var(--ink);
    font-family: var(--font-body); font-size: 1.32rem; line-height: 1.7;
    padding: 2rem 2.1rem; caret-color: var(--accent); outline: none;
  }
  .script-box textarea::placeholder { color: var(--ink-faint); font-style: italic; }
  .script-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 2.1rem; border-top: 1px solid var(--line-soft);
  }
  .link-btn {
    background: none; border: none; cursor: pointer; padding: 0;
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.24em;
    font-size: 0.58rem; color: var(--ink-faint); transition: color 0.3s ease;
  }
  .link-btn:hover { color: var(--accent); }

  .opts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.4rem; margin-top: 1.4rem; }
  .opt-card { background: var(--surface); border: 1px solid var(--line); padding: 1.6rem 1.7rem; }
  .opt-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.1rem; }
  .opt-key { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.24em; font-size: 0.6rem; color: var(--ink-dim); }
  .opt-val { font-family: var(--font-head); color: var(--accent); font-size: 1.5rem; }
  .opt-val small { font-family: var(--font-mono); font-size: 0.56rem; color: var(--ink-faint); letter-spacing: 0.18em; margin-left: 6px; }

  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 2px; background: #2a2620; border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); cursor: pointer; box-shadow: 0 0 0 4px var(--accent-soft); transition: box-shadow .25s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { box-shadow: 0 0 0 7px rgba(180,150,90,0.22); }
  input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; border: none; border-radius: 50%; background: var(--accent); cursor: pointer; }

  .seg { display: flex; gap: 0; }
  .seg button {
    flex: 1; text-align: center; padding: 10px 8px; cursor: pointer; white-space: nowrap;
    font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
    border: 1px solid var(--line); background: transparent; color: var(--ink-faint);
    transition: all .3s ease;
  }
  .seg button + button { border-left: none; }
  .seg button.on { border-color: var(--accent); background: var(--accent-soft); color: var(--ink); }

  .preview { margin-top: 1.4rem; background: var(--surface); border: 1px solid var(--line); padding: 1.6rem 1.7rem; }
  .preview .opt-key { display: block; margin-bottom: 1.1rem; }
  .preview-stage {
    position: relative; height: 168px; background: var(--bg); border: 1px solid var(--line-soft);
    overflow: hidden; display: grid; place-items: center; padding: 0 1.5rem;
  }
  .preview-line {
    font-family: var(--font-body); color: #ece6d8; text-align: center; line-height: 1.4; margin: 0;
    max-width: 22ch; white-space: pre-wrap; word-break: break-word; text-shadow: 0 2px 30px rgba(0,0,0,0.5);
  }

  .begin-row { display: flex; align-items: center; gap: 1.4rem; margin-top: 2.6rem; flex-wrap: wrap; }
  .begin {
    display: inline-flex; align-items: center; gap: 12px; cursor: pointer;
    background: var(--accent); border: 1px solid var(--accent); color: #0a0a0a;
    font-family: var(--font-head); font-size: 1.15rem; letter-spacing: 0.02em;
    padding: 14px 34px; transition: all .3s ease;
  }
  .begin:hover { background: #c4a668; border-color: #c4a668; }
  .begin span { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.2em; }
  .hint { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.22em; font-size: 0.58rem; color: var(--ink-faint); }

  /* ---------- FOOTER ---------- */
  footer.site { border-top: 1px solid var(--line-soft); padding: 2.4rem 0; background: var(--bg-soft); }
  footer.site .wrap { display: flex; align-items: center; justify-content: space-between; }
  footer .f-brand { font-family: var(--font-head); color: var(--accent); font-size: 1rem; letter-spacing: 0.04em; }
  footer .f-copy { color: var(--ink-faint); font-size: 0.64rem; }

  /* ---------- PROMPTER OVERLAY ---------- */
  .prompter {
    position: fixed; inset: 0; z-index: 200; display: none; flex-direction: column; background: var(--bg);
  }
  .prompter.show { display: flex; }
  .stage { position: relative; flex: 1; overflow: hidden; }
  .scroller { will-change: transform; padding: 45vh max(48px, 8vw); }
  .reading {
    font-family: var(--font-body); font-size: 56px; line-height: 1.6; color: #ece6d8;
    text-align: center; white-space: pre-wrap; word-break: break-word; max-width: 22ch; margin: 0 auto;
    letter-spacing: 0.005em; text-shadow: 0 2px 30px rgba(0,0,0,0.5);
  }

  .veil { position: absolute; inset: 0; pointer-events: none; }
  .veil.manuscript { background: linear-gradient(to bottom, rgba(10,10,10,0.97) 0%, rgba(10,10,10,0.62) 24%, rgba(10,10,10,0) 41%, rgba(10,10,10,0) 59%, rgba(10,10,10,0.62) 76%, rgba(10,10,10,0.97) 100%); }
  .band { position: absolute; left: 0; right: 0; height: 1px; pointer-events: none; background: linear-gradient(90deg, transparent, rgba(180,150,90,0.32) 18%, rgba(180,150,90,0.32) 82%, transparent); }
  .band.top { top: 41%; } .band.bot { top: 59%; }
  .veil.cinema { background: linear-gradient(to bottom, rgba(0,0,0,0.99) 0%, rgba(0,0,0,0.99) 30%, rgba(0,0,0,0.2) 43%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.2) 57%, rgba(0,0,0,0.99) 70%, rgba(0,0,0,0.99) 100%); }
  .marker { position: absolute; top: 50%; pointer-events: none; color: var(--accent); font-size: 22px; }
  .marker.l { left: max(20px, 4vw); transform: translateY(-50%); }
  .marker.r { right: max(20px, 4vw); transform: translateY(-50%) scaleX(-1); }
  .hidden { display: none !important; }

  .progress { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.04); }
  .progress > div { height: 100%; width: 0%; background: var(--accent); }

  .rolling { position: absolute; top: 22px; left: 26px; display: flex; align-items: center; gap: 9px; pointer-events: none; }
  .rolling span.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); animation: tpRec 1.6s ease-in-out infinite; }
  .rolling span.lbl { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.26em; font-size: 0.58rem; color: var(--ink-dim); }
  @keyframes tpRec { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

  .ctl-bar {
    position: relative; z-index: 5; display: flex; align-items: center; justify-content: center; gap: 0.7rem;
    padding: 1.1rem 1.4rem calc(1.1rem + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(10,10,10,0.96), rgba(10,10,10,0.7));
    border-top: 1px solid var(--line-soft); flex-wrap: wrap;
    transition: opacity .4s ease; 
  }
  .ctl-bar.faded { opacity: 0; pointer-events: none; }
  .ctl {
    display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
    background: transparent; border: 1px solid var(--line); color: var(--ink-dim);
    font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
    padding: 10px 14px; transition: all .25s ease;
  }
  .ctl:hover { color: var(--ink); border-color: #2a2620; }
  .pill {
    background: transparent; border: 1px solid var(--line); cursor: pointer; color: var(--ink-dim);
    font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.08em; padding: 9px 13px; transition: all .25s ease;
  }
  .pill:hover { color: var(--ink); }
  .pill.l { border-right: none; }
  .readout {
    min-width: 86px; text-align: center; font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.16em;
    color: var(--accent); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 9px 4px; text-transform: uppercase;
  }
  .sep { width: 1px; height: 26px; background: var(--line); margin: 0 0.3rem; }
  .play {
    display: inline-flex; align-items: center; gap: 9px; cursor: pointer; margin: 0 0.2rem;
    background: var(--accent); border: 1px solid var(--accent); color: #0a0a0a;
    font-family: var(--font-mono); padding: 10px 22px; transition: all .25s ease;
  }
  .play:hover { background: #c4a668; }
  .play span { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; }
  .group { display: flex; align-items: center; gap: 0; }

  @media (max-width: 860px) {
    .navlinks { gap: 1.2rem; }
    .navlinks a { font-size: 0.62rem; letter-spacing: 0.18em; }
    .opts { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    nav.site .wrap { height: 58px; }
    .logo { font-size: 1rem; }
    .navlinks a:nth-child(1) { display: none; }
    .navlinks a:nth-child(2) { display: none; }
    footer.site .wrap { flex-direction: column; gap: 0.8rem; align-items: flex-start; }
  }
</style>
</head>
<body data-screen-label="Teleprompter">
<nav class="site">
  <div class="wrap">
    <a href="index.html" class="logo">Blade of Takumi</a>
    <div class="navlinks">
      <a class="mono" href="index.html#presence">Presence</a>
      <a class="mono" href="index.html#tools">Tools</a>
      <a class="mono" href="Essays.html">Essays</a>
      <a class="mono" href="https://www.instagram.com/bladeoftakumi" target="_blank" rel="noopener noreferrer">Connect</a>
    </div>
  </div>
</nav>

<header class="page-head">
  <div class="wrap">
    <div class="sec-head">
      <span class="label mono">Teleprompter</span>
      <span class="rule"></span>
      <span class="count" id="word-count">0 words</span>
    </div>
    <h1 class="page-title">Set the pace.</h1>
  </div>
</header>

<main class="setup wrap">
  <div style="padding-top: clamp(2.4rem, 6vh, 4rem);">
    <p class="step-label">01 — Your script</p>
  </div>

  <div class="script-box">
    <textarea id="script" placeholder="Paste or type your script here…" spellcheck="false"></textarea>
    <div class="script-foot">
      <button class="link-btn" id="load-sample">↧ Load sample passage</button>
      <button class="link-btn" id="clear-text">✕ Clear</button>
    </div>
  </div>

  <p class="step-label" style="margin-top: 3.2rem;">02 — How it travels</p>

  <div class="opts">
    <div class="opt-card">
      <div class="opt-top">
        <span class="opt-key">Speed</span>
        <span class="opt-val"><span id="speed-val">80</span><small>PX/S</small></span>
      </div>
      <input type="range" id="speed" min="20" max="400" step="5" value="80" />
    </div>

    <div class="opt-card">
      <div class="opt-top">
        <span class="opt-key">Text size</span>
        <span class="opt-val"><span id="font-val">56</span><small>PX</small></span>
      </div>
      <input type="range" id="font" min="24" max="120" step="2" value="56" />
    </div>

    <div class="opt-card">
      <span class="opt-key" style="display:block; margin-bottom: 1.05rem;">Scroll style</span>
      <div class="seg" id="seg-style">
        <button data-style="glide" class="on">Glide</button>
        <button data-style="step">Step</button>
      </div>
    </div>

    <div class="opt-card">
      <span class="opt-key" style="display:block; margin-bottom: 1.05rem;">Stage look</span>
      <div class="seg" id="seg-variant">
        <button data-variant="manuscript" class="on">Manuscript</button>
        <button data-variant="cinema">Cinema</button>
      </div>
    </div>
  </div>

  <div class="preview">
    <span class="opt-key">Preview</span>
    <div class="preview-stage">
      <p class="preview-line" id="preview-line"></p>
    </div>
  </div>

  <div class="begin-row">
    <button class="begin" id="begin">Begin <span>▶</span></button>
    <span class="hint">Space to play · ↑↓ speed · F fullscreen</span>
  </div>
</main>

<footer class="site">
  <div class="wrap">
    <span class="f-brand">Blade of Takumi</span>
    <span class="f-copy mono">© 2026 — All rights reserved</span>
  </div>
</footer>

<!-- PROMPTER OVERLAY -->
<div class="prompter" id="prompter">
  <div class="stage" id="stage">
    <div class="scroller" id="scroller">
      <div class="reading" id="reading"></div>
    </div>

    <div class="veil manuscript" id="veil-manuscript"></div>
    <div class="band top" id="band-top"></div>
    <div class="band bot" id="band-bot"></div>

    <div class="veil cinema hidden" id="veil-cinema"></div>
    <div class="marker l hidden" id="marker-l">▶</div>
    <div class="marker r hidden" id="marker-r">▶</div>
  </div>

  <div class="progress"><div id="progress-bar"></div></div>

  <div class="rolling hidden" id="rolling">
    <span class="dot"></span>
    <span class="lbl">Rolling</span>
  </div>

  <div class="ctl-bar" id="ctl-bar">
    <button class="ctl" id="exit">✕ Exit</button>
    <button class="ctl" id="restart">↺ Restart</button>
    <span class="sep"></span>
    <div class="group">
      <button class="pill l" id="font-down">A−</button>
      <button class="pill" id="font-up">A+</button>
    </div>
    <button class="play" id="play"><span id="play-glyph">▶</span> <span id="play-label">Play</span></button>
    <div class="group">
      <button class="pill l" id="speed-down">−</button>
      <span class="readout" id="speed-readout">80 px/s</span>
      <button class="pill" id="speed-up">+</button>
    </div>
    <span class="sep"></span>
    <button class="ctl" id="toggle-style">∿ Glide</button>
    <button class="ctl" id="fullscreen">⤢ Full</button>
  </div>
</div>

<script>
(function () {
  var SAMPLE = "The artisan does not chase the blade.\n\nHe waits. He listens to the steel, to the breath in the forge, to the slow argument between fire and patience.\n\nMastery is not a moment of brilliance. It is ten thousand quiet mornings, each one folded into the next, until the hand forgets that it was ever uncertain.\n\nSpeak slowly. Let each line land. The work was never in a hurry — neither are you.";

  var $ = function (id) { return document.getElementById(id); };

  var state = {
    speed: 80,
    fontSize: 56,
    playStyle: 'glide',   // 'glide' | 'step'
    variant: 'manuscript',// 'manuscript' | 'cinema'
    playing: false,
    controlsVisible: true
  };
  var offset = 0, maxOffset = 1;
  var raf = null, stepTimer = null, lastTs = null, hideT = null;

  // ---- elements
  var scriptEl = $('script'), wordCountEl = $('word-count');
  var prompter = $('prompter'), stage = $('stage'), scroller = $('scroller'), reading = $('reading');
  var progressBar = $('progress-bar'), ctlBar = $('ctl-bar'), rolling = $('rolling');

  // ---- init
  scriptEl.value = SAMPLE;
  updateWordCount();
  updatePreview();

  function updateWordCount() {
    var t = scriptEl.value.trim();
    var n = t ? t.split(/\s+/).length : 0;
    wordCountEl.textContent = n + (n === 1 ? ' word' : ' words');
  }

  function firstLine() {
    var lines = scriptEl.value.split('\n').map(function (s) { return s.trim(); }).filter(Boolean);
    return lines[0] || 'Speak slowly. Let each line land.';
  }
  function updatePreview() {
    var p = $('preview-line');
    p.textContent = firstLine();
    p.style.fontSize = state.fontSize + 'px';
  }

  // ---- engine
  function applyOffset() {
    scroller.style.transform = 'translateY(' + (-offset) + 'px)';
    if (maxOffset) progressBar.style.width = Math.min(100, (offset / maxOffset) * 100) + '%';
  }
  function applyFont() { reading.style.fontSize = state.fontSize + 'px'; }
  function measure() {
    maxOffset = Math.max(1, scroller.scrollHeight - stage.clientHeight * 0.92);
  }
  function stopLoops() { cancelAnimationFrame(raf); clearTimeout(stepTimer); }

  function startGlide() {
    scroller.style.transition = 'none';
    lastTs = null;
    var loop = function (ts) {
      if (!state.playing || state.playStyle !== 'glide') return;
      if (lastTs != null) {
        var dt = (ts - lastTs) / 1000;
        offset += state.speed * dt;
        if (offset >= maxOffset) { offset = maxOffset; applyOffset(); pause(); return; }
        applyOffset();
      }
      lastTs = ts;
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
  }

  function startStep() {
    scroller.style.transition = 'transform .45s cubic-bezier(.22,.7,.2,1)';
    var tick = function () {
      if (!state.playing || state.playStyle !== 'step') return;
      var lh = state.fontSize * 1.6;
      offset += lh;
      if (offset >= maxOffset) { offset = maxOffset; applyOffset(); pause(); return; }
      applyOffset();
      var interval = Math.max(420, (lh / state.speed) * 1000);
      stepTimer = setTimeout(tick, interval);
    };
    tick();
  }

  function play() {
    if (state.playing) return;
    measure();
    if (offset >= maxOffset) offset = 0;
    state.playing = true;
    syncPlayUI();
    if (state.playStyle === 'step') startStep(); else startGlide();
    scheduleHide();
  }
  function pause() {
    stopLoops();
    state.playing = false;
    syncPlayUI();
    showControls();
    clearTimeout(hideT);
  }
  function togglePlay() { state.playing ? pause() : play(); }

  function syncPlayUI() {
    $('play-glyph').textContent = state.playing ? '❚❚' : '▶';
    $('play-label').textContent = state.playing ? 'Pause' : 'Play';
    rolling.classList.toggle('hidden', !state.playing);
  }

  function scheduleHide() {
    clearTimeout(hideT);
    hideT = setTimeout(function () {
      if (state.playing) { state.controlsVisible = false; ctlBar.classList.add('faded'); }
    }, 2600);
  }
  function showControls() {
    state.controlsVisible = true;
    ctlBar.classList.remove('faded');
  }

  // ---- nav between setup / prompter
  function start() {
    if (!scriptEl.value.trim()) return;
    reading.textContent = scriptEl.value;
    offset = 0;
    prompter.classList.add('show');
    requestAnimationFrame(function () {
      applyFont();
      measure();
      applyOffset();
    });
    showControls();
  }
  function exitPrompter() {
    stopLoops();
    state.playing = false;
    prompter.classList.remove('show');
    syncPlayUI();
  }
  function restart() {
    stopLoops();
    state.playing = false;
    offset = 0;
    applyOffset();
    syncPlayUI();
    showControls();
  }

  // ---- adjust
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function setSpeed(v) {
    state.speed = clamp(v, 20, 400);
    $('speed').value = state.speed;
    $('speed-val').textContent = state.speed;
    $('speed-readout').textContent = state.speed + ' px/s';
  }
  function setFont(v) {
    state.fontSize = clamp(v, 24, 120);
    $('font').value = state.fontSize;
    $('font-val').textContent = state.fontSize;
    updatePreview();
    applyFont(); measure(); applyOffset();
  }

  function setPlayStyle(s) {
    var wasPlaying = state.playing;
    stopLoops();
    state.playing = false;
    state.playStyle = s;
    syncPlayUI();
    // segmented buttons
    [].forEach.call(document.querySelectorAll('#seg-style button'), function (b) {
      b.classList.toggle('on', b.dataset.style === s);
    });
    $('toggle-style').textContent = (s === 'step' ? '⠿ Step' : '∿ Glide');
    scroller.style.transition = 'none';
    if (wasPlaying) play();
  }

  function setVariant(v) {
    state.variant = v;
    [].forEach.call(document.querySelectorAll('#seg-variant button'), function (b) {
      b.classList.toggle('on', b.dataset.variant === v);
    });
    var isManu = v === 'manuscript';
    $('veil-manuscript').classList.toggle('hidden', !isManu);
    $('band-top').classList.toggle('hidden', !isManu);
    $('band-bot').classList.toggle('hidden', !isManu);
    $('veil-cinema').classList.toggle('hidden', isManu);
    $('marker-l').classList.toggle('hidden', isManu);
    $('marker-r').classList.toggle('hidden', isManu);
    measure();
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) { prompter.requestFullscreen && prompter.requestFullscreen(); }
    else if (document.exitFullscreen) document.exitFullscreen();
  }

  // ---- wiring
  scriptEl.addEventListener('input', function () { updateWordCount(); updatePreview(); });
  $('load-sample').addEventListener('click', function () { scriptEl.value = SAMPLE; updateWordCount(); });
  $('clear-text').addEventListener('click', function () { scriptEl.value = ''; updateWordCount(); scriptEl.focus(); });
  $('speed').addEventListener('input', function (e) { setSpeed(Number(e.target.value)); });
  $('font').addEventListener('input', function (e) { setFont(Number(e.target.value)); });

  [].forEach.call(document.querySelectorAll('#seg-style button'), function (b) {
    b.addEventListener('click', function () { setPlayStyle(b.dataset.style); });
  });
  [].forEach.call(document.querySelectorAll('#seg-variant button'), function (b) {
    b.addEventListener('click', function () { setVariant(b.dataset.variant); });
  });

  $('begin').addEventListener('click', start);
  $('exit').addEventListener('click', exitPrompter);
  $('restart').addEventListener('click', restart);
  $('play').addEventListener('click', togglePlay);
  $('font-down').addEventListener('click', function () { setFont(state.fontSize - 4); });
  $('font-up').addEventListener('click', function () { setFont(state.fontSize + 4); });
  $('speed-down').addEventListener('click', function () { setSpeed(state.speed - 10); });
  $('speed-up').addEventListener('click', function () { setSpeed(state.speed + 10); });
  $('toggle-style').addEventListener('click', function () { setPlayStyle(state.playStyle === 'glide' ? 'step' : 'glide'); });
  $('fullscreen').addEventListener('click', toggleFullscreen);

  // reveal controls on movement while in prompter
  prompter.addEventListener('mousemove', function () {
    if (!prompter.classList.contains('show')) return;
    if (!state.controlsVisible) showControls();
    if (state.playing) scheduleHide();
  });

  // keyboard
  document.addEventListener('keydown', function (e) {
    if (!prompter.classList.contains('show')) return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setSpeed(state.speed + 10); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); setSpeed(state.speed - 10); }
    else if (e.key === '+' || e.key === '=') { e.preventDefault(); setFont(state.fontSize + 4); }
    else if (e.key === '-' || e.key === '_') { e.preventDefault(); setFont(state.fontSize - 4); }
    else if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
    else if (e.key === 'r' || e.key === 'R') { restart(); }
    else if (e.key === 'Escape') { if (!document.fullscreenElement) exitPrompter(); }
  });

  window.addEventListener('resize', function () {
    if (prompter.classList.contains('show')) { measure(); applyOffset(); }
  });
})();
</script>
