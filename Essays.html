<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Essays — Blade of Takumi</title>
<link rel="icon" type="image/png" href="assets/logo-line.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Spectral:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --bg-soft: #0e0d0b;
    --surface: #121110;
    --line: #211f1b;
    --line-soft: #1a1815;
    --ink: #e9e4d8;
    --ink-dim: #9a948a;
    --ink-faint: #6b665d;
    --accent: #b4965a;
    --accent-soft: rgba(180,150,90,0.14);
    --font-head: 'Instrument Serif', Georgia, serif;
    --font-body: 'Spectral', Georgia, serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent-soft); color: var(--ink); }
  a { color: inherit; text-decoration: none; }

  .mono {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: 0.72rem;
  }
  .wrap { width: min(1180px, 90vw); margin: 0 auto; }

  /* ---------- NAV ---------- */
  nav.site {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,10,0.78);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line-soft);
  }
  nav.site .wrap {
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .logo {
    font-family: var(--font-head);
    color: var(--accent);
    font-size: 1.18rem;
    letter-spacing: 0.04em;
  }
  .navlinks { display: flex; gap: clamp(1.4rem, 3vw, 2.8rem); }
  .navlinks a { color: var(--ink-dim); transition: color 0.3s ease; position: relative; }
  .navlinks a::after {
    content: ""; position: absolute; left: 0; bottom: -6px;
    width: 100%; height: 1px; background: var(--accent);
    transform: scaleX(0); transform-origin: left; transition: transform 0.35s ease;
  }
  .navlinks a:hover { color: var(--ink); }
  .navlinks a:hover::after { transform: scaleX(1); }
  .navlinks a.active { color: var(--ink); }
  .navlinks a.active::after { transform: scaleX(1); }

  /* ---------- PAGE HEAD ---------- */
  .page-head { padding: clamp(4rem, 9vh, 6.5rem) 0 0; }
  .sec-head { display: flex; align-items: center; gap: 1.6rem; }
  .sec-head .label { color: var(--accent); white-space: nowrap; }
  .sec-head .rule { height: 1px; background: linear-gradient(90deg, var(--accent), var(--line)); flex: 1; opacity: 0.6; }
  .page-title {
    font-family: var(--font-head);
    font-weight: 400;
    font-size: clamp(2.8rem, 6vw, 4.6rem);
    line-height: 1;
    margin: 2.2rem 0 0;
    letter-spacing: 0.01em;
  }
  .page-dek {
    font-style: italic;
    color: var(--ink-dim);
    font-size: 1.2rem;
    margin: 1.1rem 0 0;
    max-width: 48ch;
    line-height: 1.5;
  }

  /* ---------- INDEX ---------- */
  .essay-list { padding: clamp(3rem, 7vh, 5rem) 0 clamp(5rem, 11vh, 8rem); }
  .essay-row {
    display: grid;
    grid-template-columns: 180px 1fr auto;
    gap: 2rem;
    align-items: baseline;
    padding: 2.4rem 0;
    border-bottom: 1px solid var(--line-soft);
    transition: background 0.3s ease;
  }
  .essay-row:first-child { border-top: 1px solid var(--line-soft); }
  .er-date { color: var(--ink-faint); font-size: 0.66rem; }
  .er-main { min-width: 0; }
  .er-title {
    font-family: var(--font-head);
    font-weight: 400;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    line-height: 1.1;
    margin: 0;
    color: var(--ink);
    transition: color 0.3s ease;
  }
  .er-excerpt {
    color: var(--ink-dim);
    font-size: 1.05rem;
    line-height: 1.55;
    margin: 0.7rem 0 0;
    max-width: 62ch;
    text-wrap: pretty;
  }
  .er-side {
    display: flex; align-items: baseline; gap: 0.6rem;
    color: var(--ink-faint); white-space: nowrap;
    font-family: var(--font-mono); font-size: 0.64rem;
    text-transform: uppercase; letter-spacing: 0.24em;
    transition: color 0.3s ease;
  }
  .er-side svg { width: 16px; height: 16px; align-self: center; transition: transform 0.4s cubic-bezier(.2,.7,.2,1); }
  .essay-row:hover .er-title { color: var(--accent); }
  .essay-row:hover .er-side { color: var(--accent); }
  .essay-row:hover .er-side svg { transform: translateX(6px); }

  .list-note {
    padding: 4rem 0 6rem;
    color: var(--ink-faint);
    font-style: italic;
    font-size: 1.05rem;
  }

  /* ---------- READER ---------- */
  .reader { padding: clamp(3.4rem, 8vh, 6rem) 0 clamp(5rem, 12vh, 9rem); }
  .reader-col { width: min(720px, 90vw); margin: 0 auto; }
  .back-link {
    display: inline-flex; align-items: center; gap: 0.6rem;
    color: var(--ink-faint);
    font-family: var(--font-mono); font-size: 0.66rem;
    text-transform: uppercase; letter-spacing: 0.24em;
    transition: color 0.3s ease;
  }
  .back-link svg { width: 16px; height: 16px; transition: transform 0.35s ease; }
  .back-link:hover { color: var(--accent); }
  .back-link:hover svg { transform: translateX(-5px); }
  .reader-meta {
    display: flex; align-items: baseline; gap: 1.4rem;
    color: var(--ink-faint);
    margin-top: 3rem;
    font-size: 0.66rem;
  }
  .reader-title {
    font-family: var(--font-head);
    font-weight: 400;
    font-size: clamp(2.6rem, 6vw, 4.2rem);
    line-height: 1.04;
    margin: 1.2rem 0 0;
    letter-spacing: 0.01em;
    text-wrap: pretty;
  }
  .reader-sub {
    font-style: italic;
    color: var(--ink-dim);
    font-size: 1.3rem;
    line-height: 1.45;
    margin: 1.2rem 0 0;
    text-wrap: pretty;
  }
  .reader-rule {
    height: 1px; margin: 2.8rem 0 3rem;
    background: linear-gradient(90deg, var(--accent), var(--line));
    opacity: 0.6;
  }
  .reader-body p {
    font-size: 1.22rem;
    line-height: 1.75;
    font-weight: 300;
    color: var(--ink);
    margin: 0 0 1.6em;
    text-wrap: pretty;
  }
  .reader-body h2 {
    font-family: var(--font-head);
    font-weight: 400;
    font-size: 1.9rem;
    line-height: 1.15;
    margin: 2.4em 0 0.8em;
    color: var(--ink);
  }
  .reader-body blockquote {
    margin: 2.4em 0;
    padding: 0;
    font-family: var(--font-head);
    font-style: italic;
    font-size: 1.7rem;
    line-height: 1.35;
    color: var(--accent);
    text-wrap: pretty;
  }
  .reader-body hr {
    border: none; height: 1px; width: 120px;
    margin: 3em auto;
    background: var(--line);
  }
  .reader-end {
    display: flex; justify-content: center;
    color: var(--accent); opacity: 0.7;
    margin-top: 3.4rem;
    font-size: 0.8rem; letter-spacing: 0.5em;
  }

  /* ---------- FOOTER ---------- */
  footer.site {
    border-top: 1px solid var(--line-soft);
    padding: 2.4rem 0;
    background: var(--bg-soft);
  }
  footer.site .wrap { display: flex; align-items: center; justify-content: space-between; }
  footer .f-brand { font-family: var(--font-head); color: var(--accent); font-size: 1rem; letter-spacing: 0.04em; }
  footer .f-copy { color: var(--ink-faint); font-size: 0.64rem; }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 860px) {
    .essay-row { grid-template-columns: 1fr; gap: 0.7rem; }
    .er-side { display: none; }
    .navlinks { gap: 1.2rem; }
    .navlinks a { font-size: 0.62rem; letter-spacing: 0.18em; }
  }
  @media (max-width: 560px) {
    nav.site .wrap { height: 58px; }
    .logo { font-size: 1rem; }
    .navlinks a:nth-child(1) { display: none; }
    footer.site .wrap { flex-direction: column; gap: 0.8rem; align-items: flex-start; }
  }
</style>
</head>
<body>
<nav class="site">
  <div class="wrap">
    <a href="index.html" class="logo">Blade of Takumi</a>
    <div class="navlinks">
      <a class="mono" href="index.html#presence">Presence</a>
      <a class="mono" href="index.html#tools">Tools</a>
      <a class="mono active" href="Essays.html">Essays</a>
      <a class="mono" href="https://www.instagram.com/bladeoftakumi" target="_blank" rel="noopener noreferrer">Connect</a>
    </div>
  </div>
</nav>

<main id="view"></main>

<footer class="site">
  <div class="wrap">
    <span class="f-brand">Blade of Takumi</span>
    <span class="f-copy mono">© 2026 — All rights reserved</span>
  </div>
</footer>

<script>
(function () {
  var MANIFEST = "essays/essays.txt";
  var view = document.getElementById("view");
  var essays = [];   // { slug, file, title, subtitle, date(Date|null), body(lines), words }
  var loaded = false;

  /* ---------- helpers ---------- */
  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function fmtDate(d) {
    if (!d) return "Undated";
    return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  }
  function readTime(words) {
    return Math.max(1, Math.round(words / 220)) + " min read";
  }

  /* ---------- parsing ---------- */
  function parseEssay(file, text, lastModified) {
    var lines = text.replace(/\r\n/g, "\n").split("\n");
    var i = 0;
    while (i < lines.length && lines[i].trim() === "") i++;
    var title = (lines[i] || file).trim();
    i++;
    var meta = {};
    while (i < lines.length && /^(date|subtitle)\s*:/i.test(lines[i])) {
      var m = lines[i].match(/^(\w+)\s*:\s*(.*)$/);
      if (m) meta[m[1].toLowerCase()] = m[2].trim();
      i++;
    }
    var bodyLines = lines.slice(i).join("\n").replace(/^\n+/, "").split("\n");

    var date = null;
    if (meta.date) {
      var p = new Date(meta.date + "T12:00:00");
      if (!isNaN(p)) date = p;
    }
    if (!date && lastModified) {
      var lm = new Date(lastModified);
      if (!isNaN(lm)) date = lm;
    }

    var words = bodyLines.join(" ").split(/\s+/).filter(Boolean).length;
    return {
      slug: file.replace(/\.txt$/i, ""),
      file: file,
      title: title,
      subtitle: meta.subtitle || "",
      date: date,
      body: bodyLines,
      words: words
    };
  }

  function firstParagraph(body) {
    var para = [];
    for (var i = 0; i < body.length; i++) {
      var l = body[i].trim();
      if (l === "" ) { if (para.length) break; else continue; }
      if (/^##\s/.test(l) || /^>\s/.test(l) || l === "---") { if (para.length) break; else continue; }
      para.push(l);
    }
    var s = para.join(" ");
    if (s.length > 190) s = s.slice(0, 190).replace(/\s+\S*$/, "") + "…";
    return s;
  }

  function bodyToHtml(body) {
    var html = [];
    var para = [];
    function flush() {
      if (para.length) { html.push("<p>" + esc(para.join(" ")) + "</p>"); para = []; }
    }
    for (var i = 0; i < body.length; i++) {
      var l = body[i].trim();
      if (l === "") { flush(); continue; }
      if (l === "---") { flush(); html.push("<hr />"); continue; }
      if (/^##\s/.test(l)) { flush(); html.push("<h2>" + esc(l.replace(/^##\s+/, "")) + "</h2>"); continue; }
      if (/^>\s/.test(l)) { flush(); html.push("<blockquote>" + esc(l.replace(/^>\s+/, "")) + "</blockquote>"); continue; }
      para.push(l);
    }
    flush();
    return html.join("\n");
  }

  /* ---------- views ---------- */
  function renderIndex() {
    document.title = "Essays — Blade of Takumi";
    var rows = essays.map(function (e) {
      return '<a class="essay-row" href="#/' + encodeURIComponent(e.slug) + '">' +
        '<span class="er-date mono">' + esc(fmtDate(e.date)) + '</span>' +
        '<span class="er-main">' +
          '<h2 class="er-title">' + esc(e.title) + '</h2>' +
          (firstParagraph(e.body) ? '<p class="er-excerpt">' + esc(firstParagraph(e.body)) + '</p>' : '') +
        '</span>' +
        '<span class="er-side">' + readTime(e.words) +
          ' <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13"></path><path d="M13 6l6 6-6 6"></path></svg>' +
        '</span>' +
      '</a>';
    }).join("");

    view.innerHTML =
      '<div data-screen-label="Essay index">' +
        '<header class="page-head"><div class="wrap">' +
          '<div class="sec-head"><span class="label mono">Essays</span><span class="rule"></span></div>' +
          '<h1 class="page-title">Written by hand,<br />read slowly.</h1>' +
        '</div></header>' +
        '<section class="essay-list"><div class="wrap">' +
          (rows || '<p class="list-note">No essays yet. Drop a .txt file into the essays folder and list it in essays.txt.</p>') +
        '</div></section>' +
      '</div>';
    window.scrollTo(0, 0);
  }

  function renderEssay(slug) {
    var e = null;
    for (var i = 0; i < essays.length; i++) if (essays[i].slug === slug) e = essays[i];
    if (!e) { renderIndex(); return; }
    document.title = e.title + " — Blade of Takumi";
    view.innerHTML =
      '<article class="reader" data-screen-label="Essay: ' + esc(e.title) + '"><div class="reader-col">' +
        '<a class="back-link" href="#">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H6"></path><path d="M11 18l-6-6 6-6"></path></svg>' +
          ' All essays</a>' +
        '<div class="reader-meta mono"><span>' + esc(fmtDate(e.date)) + '</span><span>' + readTime(e.words) + '</span></div>' +
        '<h1 class="reader-title">' + esc(e.title) + '</h1>' +
        (e.subtitle ? '<p class="reader-sub">' + esc(e.subtitle) + '</p>' : '') +
        '<div class="reader-rule"></div>' +
        '<div class="reader-body">' + bodyToHtml(e.body) + '</div>' +
        '<div class="reader-end">⸻</div>' +
      '</div></article>';
    window.scrollTo(0, 0);
  }

  function route() {
    if (!loaded) return;
    var h = location.hash;
    if (h && h.indexOf("#/") === 0 && h.length > 2) {
      renderEssay(decodeURIComponent(h.slice(2)));
    } else {
      renderIndex();
    }
  }

  /* ---------- load ---------- */
  /* The essay list comes from two sources, merged:
     1. GitHub's public API — lists every .txt in the essays/ folder of the
        live repo, so just committing a file publishes it (no manifest edit).
     2. essays/essays.txt — a plain-text fallback list, used if the API is
        unreachable or rate-limited. */
  var GH = { owner: "bladeoftakumi", repo: "bladeoftakumi", branch: "main", dir: "essays" };
  var EXCLUDE = { "essays.txt": 1, "how-to.txt": 1 };

  function listFromGitHub() {
    return fetch("https://api.github.com/repos/" + GH.owner + "/" + GH.repo +
                 "/contents/" + GH.dir + "?ref=" + GH.branch)
      .then(function (r) { return r.ok ? r.json() : []; })
      .then(function (items) {
        if (!Array.isArray(items)) return [];
        return items
          .filter(function (it) {
            return it.type === "file" && /\.txt$/i.test(it.name) && !EXCLUDE[it.name.toLowerCase()];
          })
          .map(function (it) { return it.name; });
      })
      .catch(function () { return []; });
  }

  function listFromManifest() {
    return fetch(MANIFEST, { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("manifest");
        return r.text();
      })
      .then(function (txt) {
        return txt.split("\n")
          .map(function (l) { return l.trim(); })
          .filter(function (l) { return l && l.charAt(0) !== "#" && /\.txt$/i.test(l); });
      })
      .catch(function () { return []; });
  }

  function fetchEssay(f) {
    return fetch("essays/" + f, { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("local");
        var lm = r.headers.get("Last-Modified");
        return r.text().then(function (t) { return parseEssay(f, t, lm); });
      })
      .catch(function () {
        /* not deployed locally yet — read it straight from the repo */
        return fetch("https://raw.githubusercontent.com/" + GH.owner + "/" + GH.repo +
                     "/" + GH.branch + "/" + GH.dir + "/" + f)
          .then(function (r) {
            if (!r.ok) return null;
            return r.text().then(function (t) { return parseEssay(f, t, null); });
          })
          .catch(function () { return null; });
      });
  }

  Promise.all([listFromGitHub(), listFromManifest()])
    .then(function (lists) {
      var seen = {}, files = [];
      lists[0].concat(lists[1]).forEach(function (f) {
        var k = f.toLowerCase();
        if (!seen[k]) { seen[k] = 1; files.push(f); }
      });
      return Promise.all(files.map(fetchEssay));
    })
    .then(function (list) {
      essays = list.filter(Boolean).sort(function (a, b) {
        var ta = a.date ? a.date.getTime() : 0;
        var tb = b.date ? b.date.getTime() : 0;
        return tb - ta;
      });
      loaded = true;
      route();
    })
    .catch(function () {
      loaded = true;
      essays = [];
      route();
    });

  window.addEventListener("hashchange", route);
})();
</script>
</body>
</html>
